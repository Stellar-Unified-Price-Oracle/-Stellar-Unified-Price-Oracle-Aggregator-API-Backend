apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: stellar-oracle-prod-us-east-1

resources:
  - namespace.yaml
  - ../../base
  - ../../base/multi-region

patches:
  - path: ../../overlays/prod/configmap-patch.yaml
  - target:
      kind: ConfigMap
      name: stellar-oracle-config
    patch: |-
      - op: replace
        path: /data/PRIMARY_REGION
        value: us-east-1
      - op: replace
        path: /data/SECONDARY_REGION
        value: eu-west-1
      - op: replace
        path: /data/REPLICATION_TARGET
        value: eu-west-1
  - target:
      kind: Deployment
      name: api-stable
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
  - target:
      kind: Deployment
      name: api-canary
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Deployment
      name: aggregator
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
