version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: stellar_oracle_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data_test:/var/lib/postgresql/data

  aggregator:
    build:
      context: .
      dockerfile: services/aggregator/Dockerfile
    environment:
      PORT: 4000
      DATABASE_ENABLED: "false"
      POLLING_INTERVAL_MS: "5000"
      STALENESS_THRESHOLD_MS: "30000"
      WATCHED_ASSETS: "XLM,USDC"
      LOG_LEVEL: "debug"
      SOROBAN_RPC_URL: "https://soroban-testnet.stellar.org"
      CHAINLINK_BASE_URL: "https://min-api.cryptocompare.com/data"
      REDSTONE_BASE_URL: "https://api.redstone.finance"
      BAND_BASE_URL: "https://laozi1.bandchain.org/api"
      REFLECTOR_BASE_URL: "https://api.reflector.xyz"
    ports:
      - "4000:4000"
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4002/health"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    environment:
      PORT: 3000
      API_PORT: 3000
      WS_PORT: 3001
      DATABASE_ENABLED: "true"
      DATABASE_HOST: "postgres"
      DATABASE_PORT: "5432"
      DATABASE_NAME: "stellar_oracle_test"
      DATABASE_USER: "postgres"
      DATABASE_PASSWORD: "postgres"
      AGGREGATOR_URL: "http://aggregator:4000"
      LOG_LEVEL: "debug"
    ports:
      - "3000:3000"
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      aggregator:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/v1/health"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data_test:
