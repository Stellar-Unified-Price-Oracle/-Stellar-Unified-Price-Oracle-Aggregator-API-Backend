app = "stellar-oracle-aggregator"
primary_region = "ord"
kill_signal = "SIGTERM"

[build]
  image = "stellar-oracle-aggregator:latest"

[[services]]
  protocol = "tcp"
  internal_port = 4000
  [[services.ports]]
    port = 4000

[[services]]
  protocol = "tcp"
  internal_port = 4001
  [[services.ports]]
    port = 4001

[[services]]
  protocol = "tcp"
  internal_port = 4002
  [[services.ports]]
    port = 4002

[env]
  LOG_LEVEL = "info"
  POLLING_INTERVAL_MS = "30000"
  STALENESS_THRESHOLD_MS = "120000"
  WATCHED_ASSETS = "XLM,USDC,BTC,ETH,USDT"
