app = "stellar-oracle-api"
primary_region = "ord"
kill_signal = "SIGTERM"

[build]
  image = "stellar-oracle-api:latest"

[[services]]
  protocol = "tcp"
  internal_port = 3000
  [[services.ports]]
    port = 80
    handlers = ["http"]
  [[services.ports]]
    port = 443
    handlers = ["tls"]

[[services]]
  protocol = "tcp"
  internal_port = 3001
  [[services.ports]]
    port = 3001

[env]
  LOG_LEVEL = "info"
  CACHE_TTL_MS = "15000"
  RATE_LIMIT_MAX = "100"
