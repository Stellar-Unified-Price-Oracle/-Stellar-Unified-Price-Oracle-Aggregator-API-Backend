services:
  # TimescaleDB-enabled PostgreSQL for time-series historical price data (#42).
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-oracle}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-oracle}
      POSTGRES_DB: ${POSTGRES_DB:-stellar_oracle}
    ports:
      - "5432:5432"
    volumes:
      - timescale-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-oracle} -d ${POSTGRES_DB:-stellar_oracle}"]
      interval: 10s
      timeout: 5s
      retries: 5

  aggregator:
    build:
      context: ./services/aggregator
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
      - "4001:4001"
      - "4002:4002"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    depends_on:
      timescaledb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
      - "3001:3001"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    depends_on:
      aggregator:
        condition: service_started
      timescaledb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  timescale-data:

networks:
  default:
    name: stellar-oracle-network
