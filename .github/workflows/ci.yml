name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'

jobs:
  aggregator:
    name: Aggregator service build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/aggregator
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: services/aggregator/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  api:
    name: API service build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install SDK dependencies
        run: cd ../sdk && npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify generated SDKs
        run: npm run check:generated

  contract-fuzz:
    name: Contract fuzz tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts/price-oracle
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: llvm-tools-preview

      - name: Cache Rust build artifacts
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/price-oracle/target
          key: fuzz-${{ runner.os }}-${{ hashFiles('contracts/price-oracle/Cargo.lock', 'contracts/price-oracle/fuzz/Cargo.toml') }}
          restore-keys: fuzz-${{ runner.os }}-

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Run unit fuzz tests (deterministic boundary checks)
        run: cargo test fuzz_ --lib

      - name: Fuzz fuzz_submit_price (30 s)
        run: |
          cargo fuzz run fuzz_submit_price \
            fuzz/corpus/fuzz_submit_price \
            -- -max_total_time=30 -max_len=256

      - name: Fuzz fuzz_get_price (30 s)
        run: |
          cargo fuzz run fuzz_get_price \
            fuzz/corpus/fuzz_get_price \
            -- -max_total_time=30 -max_len=512

      - name: Upload fuzz artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-artifacts
          path: contracts/price-oracle/fuzz/artifacts/
          if-no-files-found: ignore
