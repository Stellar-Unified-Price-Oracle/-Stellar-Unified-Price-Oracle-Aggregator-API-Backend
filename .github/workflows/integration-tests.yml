name: Integration Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  integration:
    name: Full Pipeline Integration Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: stellar_oracle_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    defaults:
      run:
        working-directory: api

    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup test database
        env:
          PGHOST: localhost
          PGUSER: postgres
          PGPASSWORD: postgres
          PGDATABASE: stellar_oracle_test
        run: |
          psql -c "CREATE TABLE IF NOT EXISTS price_history (
            id SERIAL PRIMARY KEY,
            asset VARCHAR(56) NOT NULL,
            price NUMERIC(30, 18) NOT NULL,
            decimals INTEGER NOT NULL,
            source VARCHAR(50) NOT NULL,
            timestamp INTEGER NOT NULL,
            created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
            UNIQUE (asset, source, timestamp)
          );"
          psql -c "CREATE TABLE IF NOT EXISTS aggregator_state (
            id SERIAL PRIMARY KEY,
            asset VARCHAR(56) NOT NULL UNIQUE,
            latest_price NUMERIC(30, 18),
            latest_timestamp INTEGER,
            confidence NUMERIC(5, 2),
            active_sources TEXT,
            last_update TIMESTAMP DEFAULT CURRENT_TIMESTAMP
          );"

      - name: Start API service
        run: npm start &
        env:
          DATABASE_ENABLED: 'true'
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_NAME: stellar_oracle_test
          DATABASE_USER: postgres
          DATABASE_PASSWORD: postgres
          LOG_LEVEL: debug

      - name: Wait for API service
        run: |
          for i in {1..30}; do
            if curl -f http://localhost:3000/api/v1/health 2>/dev/null; then
              echo "API service is ready"
              exit 0
            fi
            echo "Waiting for API service... ($i/30)"
            sleep 2
          done
          echo "API service failed to start"
          exit 1

      - name: Run integration tests
        run: npm run test:integration
        env:
          API_URL: http://localhost:3000/api/v1
          WS_URL: ws://localhost:3001
          AGGREGATOR_URL: http://localhost:4000
