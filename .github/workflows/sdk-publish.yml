name: Publish SDKs

on:
  workflow_dispatch:
  push:
    tags:
      - 'sdk-v*'

jobs:
  publish-typescript:
    name: Publish TypeScript SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '20'
          registry-url: https://registry.npmjs.org

      - name: Install SDK dependencies
        run: npm ci

      - name: Generate SDKs
        run: npm run generate:sdks

      - name: Publish to npm
        run: npm publish ./generated/typescript --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-python:
    name: Publish Python SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: python -m pip install --upgrade build twine

      - name: Generate SDKs
        run: |
          cd sdk
          npm ci
          npm run generate:sdks

      - name: Build and publish Python package
        run: |
          python -m build sdk/generated/python
          twine upload sdk/generated/python/dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}

  publish-rust:
    name: Publish Rust SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Generate SDKs
        run: |
          cd sdk
          npm ci
          npm run generate:sdks

      - name: Publish crate
        run: cargo publish --manifest-path sdk/generated/rust/Cargo.toml --token "$CARGO_REGISTRY_TOKEN"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
