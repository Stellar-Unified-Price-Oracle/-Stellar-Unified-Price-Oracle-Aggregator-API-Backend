name: Disaster Recovery Drill

on:
  push:
    branches: [main, develop]
    paths:
      - 'scripts/dr/**'
      - 'k8s/base/timescaledb/**'
      - 'api/src/services/backup.ts'
      - 'api/src/services/dr-status.ts'
      - 'docs/disaster-recovery/**'
      - '.github/workflows/disaster-recovery-drill.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'scripts/dr/**'
      - 'k8s/base/timescaledb/**'
      - 'api/src/services/backup.ts'
      - 'api/src/services/dr-status.ts'
      - 'docs/disaster-recovery/**'
      - '.github/workflows/disaster-recovery-drill.yml'
  schedule:
    # 05:00 UTC on the 1st of Jan/Apr/Jul/Oct — quarterly, see docs/disaster-recovery/drills.md
    - cron: '0 5 1 1,4,7,10 *'
  workflow_dispatch:
    inputs:
      tier:
        description: Recovery tier to drill
        required: false
        type: choice
        default: tier2
        options:
          - tier1
          - tier2

env:
  DR_TARGET_ENV: staging

jobs:
  validate-scripts:
    name: Validate DR scripts and manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Shell syntax check
        run: |
          for f in scripts/dr/*.sh; do
            echo "Checking $f"
            bash -n "$f"
          done

      - name: Install kustomize
        run: |
          curl -sL "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      - name: Validate k8s manifests build
        run: |
          chmod +x scripts/validate-k8s.sh
          ./scripts/validate-k8s.sh

  run-drill:
    name: Run DR drill (${{ github.event.inputs.tier || 'tier2' }})
    needs: validate-scripts
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        env:
          KUBECONFIG_VALUE: ${{ secrets.KUBECONFIG_STAGING }}
        run: |
          mkdir -p ~/.kube
          echo "${KUBECONFIG_VALUE}" > ~/.kube/config

      - name: Run drill
        env:
          API_BASE_URL: ${{ secrets.STAGING_API_BASE_URL }}
          ADMIN_API_KEY: ${{ secrets.STAGING_ADMIN_API_KEY }}
        run: |
          chmod +x scripts/dr/*.sh
          ./scripts/dr/run-drill.sh "${DR_TARGET_ENV}" "${{ github.event.inputs.tier || 'tier2' }}"

      - name: Upload drill report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dr-drill-report
          path: docs/disaster-recovery/reports/*.md

      - name: Commit drill report
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/disaster-recovery/reports/
          git diff --cached --quiet || git commit -m "chore: record DR drill report [skip ci]"
          git push
