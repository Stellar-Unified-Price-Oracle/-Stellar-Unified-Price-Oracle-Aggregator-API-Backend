  - package-ecosystem: docker
    directory: /services/aggregator
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - docker
      - aggregator
    commit-message:
      prefix: docker
    groups:
      docker-aggregator-patch:
        update-types:
          - patch
        patterns:
