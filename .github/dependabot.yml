version: 2
updates:
  - package-ecosystem: npm
    directory: /api
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      dependencies:
        patterns: ['*']

  - package-ecosystem: npm
    directory: /services/aggregator
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      dependencies:
        patterns: ['*']

  - package-ecosystem: cargo
    directory: /contracts/price-oracle
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: docker
    directory: /api
    schedule:
      interval: weekly

  - package-ecosystem: docker
    directory: /services/aggregator
    schedule:
      interval: weekly

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
