# Multi-window, multi-burn-rate alerting rules derived from monitoring/slo.yml
# Based on Google SRE workbook burn-rate methodology.

groups:
  - name: slo_burn_rate_api_availability
    rules:
      - record: slo:api_availability:ratio_rate5m
        expr: |
          sum(rate(http_requests_total{job="stellar-api",status_code!~"5.."}[5m]))
          /
          sum(rate(http_requests_total{job="stellar-api"}[5m]))

      - record: slo:api_availability:ratio_rate1h
        expr: |
          sum(rate(http_requests_total{job="stellar-api",status_code!~"5.."}[1h]))
          /
          sum(rate(http_requests_total{job="stellar-api"}[1h]))

      - record: slo:api_availability:ratio_rate6h
        expr: |
          sum(rate(http_requests_total{job="stellar-api",status_code!~"5.."}[6h]))
          /
          sum(rate(http_requests_total{job="stellar-api"}[6h]))

      - record: slo:api_availability:ratio_rate30m
        expr: |
          sum(rate(http_requests_total{job="stellar-api",status_code!~"5.."}[30m]))
          /
          sum(rate(http_requests_total{job="stellar-api"}[30m]))

      - alert: SLOFastBurnAPIAvailability
        expr: (1 - slo:api_availability:ratio_rate5m) > (14.4 * 0.001) and (1 - slo:api_availability:ratio_rate1h) > (14.4 * 0.001)
        for: 2m
        labels:
          severity: critical
          slo: api-availability
        annotations:
          summary: "API availability SLO fast burn"
          description: "Error budget is burning at >14.4x — at this rate the 30d budget is exhausted in <2 days"

      - alert: SLOSlowBurnAPIAvailability
        expr: (1 - slo:api_availability:ratio_rate30m) > (6 * 0.001) and (1 - slo:api_availability:ratio_rate6h) > (6 * 0.001)
        for: 15m
        labels:
          severity: warning
          slo: api-availability
        annotations:
          summary: "API availability SLO slow burn"
          description: "Error budget is burning at >6x — at this rate the 30d budget is exhausted in <5 days"

  - name: slo_burn_rate_price_freshness
    rules:
      - record: slo:price_freshness:ratio_rate5m
        expr: |
          sum(rate(stellar_oracle_price_checks_total{stale="false"}[5m]))
          /
          sum(rate(stellar_oracle_price_checks_total[5m]))

      - record: slo:price_freshness:ratio_rate1h
        expr: |
          sum(rate(stellar_oracle_price_checks_total{stale="false"}[1h]))
          /
          sum(rate(stellar_oracle_price_checks_total[1h]))

      - alert: SLOFastBurnPriceFreshness
        expr: (1 - slo:price_freshness:ratio_rate5m) > (14.4 * 0.005) and (1 - slo:price_freshness:ratio_rate1h) > (14.4 * 0.005)
        for: 2m
        labels:
          severity: critical
          slo: price-freshness
        annotations:
          summary: "Price freshness SLO fast burn"
          description: "Stale-price rate is consuming the 30d error budget at >14.4x"
