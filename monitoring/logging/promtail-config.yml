server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # JSON logs written by winston (services/aggregator/src/utils/logger.ts and
  # the equivalent API logger) — one log line per JSON object.
  - job_name: stellar-aggregator
    static_configs:
      - targets: [localhost]
        labels:
          job: stellar-aggregator
          service: aggregator
          __path__: /var/log/stellar-aggregator/*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            timestamp: timestamp
            message: message
      - labels:
          level:
      - timestamp:
          source: timestamp
          format: RFC3339

  - job_name: stellar-api
    static_configs:
      - targets: [localhost]
        labels:
          job: stellar-api
          service: api
          __path__: /var/log/stellar-api/*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            timestamp: timestamp
            message: message
      - labels:
          level:
      - timestamp:
          source: timestamp
          format: RFC3339

  # All other container stdout/stderr in multi-instance deployments,
  # discovered via the Docker socket.
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 15s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(stellar-oracle-.*)'
        target_label: container
