<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Stellar Oracle - Dependency Status</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #0f1115; color: #e6e6e6; margin: 0; padding: 2rem; }
    h1 { font-size: 1.25rem; margin-bottom: 1.5rem; }
    #graph { display: flex; flex-wrap: wrap; gap: 1rem; }
    .node {
      border-radius: 8px;
      padding: 1rem 1.25rem;
      min-width: 160px;
      border: 2px solid #444;
      background: #1a1d24;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .node .id { font-weight: 600; font-size: 0.95rem; }
    .node .type { font-size: 0.75rem; color: #9aa0a8; margin-top: 0.25rem; }
    .node .status { font-size: 0.8rem; margin-top: 0.5rem; }
    .healthy { border-color: #2ecc71; box-shadow: 0 0 8px rgba(46,204,113,0.4); }
    .degraded { border-color: #f1c40f; box-shadow: 0 0 8px rgba(241,196,15,0.4); }
    .unhealthy { border-color: #e74c3c; box-shadow: 0 0 8px rgba(231,76,60,0.4); }
    .unknown { border-color: #555; }
    #updated { font-size: 0.75rem; color: #9aa0a8; margin-top: 1.5rem; }
  </style>
</head>
<body>
  <h1>Stellar Oracle — Real-Time Dependency Status</h1>
  <div id="graph"></div>
  <div id="updated">Loading...</div>

  <script src="app.js"></script>
</body>
</html>
